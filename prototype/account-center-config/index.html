<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>主体管理账号中心配置原型</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-mark" aria-hidden="true">
          <span class="brand-knot"></span>
        </div>
        <div class="brand-name">平台服务中心</div>
        <nav class="topnav" aria-label="一级导航">
          <button>游戏控制台</button>
          <button>游戏工具<span class="caret"></span></button>
          <button class="active">项目管理</button>
        </nav>
        <div class="top-actions">
          <button class="region-select">国内<span class="caret dark"></span></button>
          <button class="icon-btn" title="文档" aria-label="文档" data-icon="file"></button>
          <button class="icon-btn" title="下载" aria-label="下载" data-icon="download"></button>
          <button class="icon-btn" title="通知" aria-label="通知" data-icon="bell"></button>
          <button class="user-pill" aria-label="当前用户"><span class="avatar"></span>王健<span class="caret"></span></button>
        </div>
      </header>

      <aside class="global-sidebar">
        <section class="sidebar-group">
          <button class="group-title">系统管理<span>⌃</span></button>
          <button>项目管理</button>
          <button>渠道管理</button>
          <button>组件管理</button>
          <button>协议管理</button>
          <button>证书管理</button>
          <button class="active">主体管理</button>
          <button>域名管理</button>
          <button>项目组件管理</button>
        </section>
        <section class="sidebar-group">
          <button class="group-title">服务端配置<span>⌃</span></button>
          <button>授权配置</button>
          <button>封禁授权</button>
          <button>渠道配置</button>
          <button>发货配置</button>
          <button>通行证配置</button>
          <button>统一登录配置</button>
        </section>
        <button class="sidebar-collapse" aria-label="折叠菜单" data-icon="panel"></button>
      </aside>

      <main class="workspace">
        <section id="listView" class="view is-active">
          <div class="list-card">
            <div class="list-toolbar">
              <h1>主体管理</h1>
              <div class="filters">
                <label>主体名称<input value="" placeholder="请输入主体名称" /></label>
                <label>项目<select><option>国内</option></select></label>
                <button class="btn primary">查询</button>
                <button class="btn">重置</button>
              </div>
            </div>
            <div class="table-title">
              <span class="section-bar"></span>
              <strong>主体列表</strong>
              <button class="btn primary add-subject" disabled>新增主体</button>
            </div>
            <div class="table-wrap">
              <table class="data-table subject-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>主体名称</th>
                    <th>账号体系(账号体系ID)</th>
                    <th>Logo</th>
                    <th>使用项目</th>
                    <th>最近更新时间</th>
                    <th>最近更新人</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="subjectRows"></tbody>
              </table>
            </div>
            <div class="pagination">
              <button class="page active">1</button>
              <button class="page">2</button>
              <button class="page">3</button>
              <span>20 条/页</span>
              <span>跳至</span>
              <input value="1" />
              <span>页</span>
            </div>
          </div>
        </section>

        <section id="detailView" class="view">
          <div class="detail-header">
            <button class="back-btn" id="backToList" aria-label="返回主体列表" data-icon="chevron-left"></button>
            <button class="upload-tile">
              <span>＋</span>
              <small>Upload</small>
            </button>
            <div class="subject-meta">
              <h1>上海游碧曜</h1>
              <div class="meta-line">
                <span>账号体系ID：<b>10001</b><i class="caret dark"></i></span>
                <span>最近更新人：<b>王健</b></span>
                <span>最近更新时间：<b>2026/11/22 17:00</b></span>
              </div>
            </div>
            <button class="btn primary save-btn" id="saveButton">保存</button>
          </div>

          <div class="config-card">
            <div class="config-title">
              <span class="section-bar"></span>
              <strong>配置信息</strong>
              <span class="breadcrumb">国内账号中心：公共配置 &gt; 能力开关 &gt; 场景复用</span>
            </div>
            <div class="tabs" role="tablist" aria-label="配置类型">
              <button class="tab active">账号中心</button>
              <button class="tab" disabled>其他示例</button>
              <button class="tab add-tab" disabled>＋ 新增配置类型</button>
            </div>
            <div class="config-layout">
              <nav class="module-menu" aria-label="账号中心二级配置">
                <button class="module-item active" data-module="brand">品牌与合规</button>
                <button class="module-item" data-module="passport">通行证能力</button>
                <button class="module-item" data-module="game">游戏配置</button>
                <button class="module-item" data-module="appeal">账号申诉</button>
                <button class="module-item" data-module="cancel">账号注销</button>
                <button class="module-item" data-module="help">问题帮助</button>
              </nav>
              <div class="module-content" id="moduleContent"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="floating-help" title="在线咨询" data-icon="message"></div>
    <div class="toast" id="toast" role="status"></div>
    <div class="modal-mask" id="modalMask" aria-hidden="true">
      <div class="modal">
        <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
        <h2 id="modalTitle">配置项</h2>
        <div id="modalText" class="modal-body">当前为高保真原型反馈。</div>
        <div class="modal-actions">
          <button class="btn" id="modalCancel">取消</button>
          <button class="btn primary" id="modalConfirm">确定</button>
        </div>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
